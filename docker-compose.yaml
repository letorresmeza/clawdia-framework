version: "3.9"

services:
  # ─── Message Bus ───
  nats:
    image: nats:latest
    network_mode: host
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - nats-data:/data

  # ─── Database ───
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clawdia
      POSTGRES_USER: clawdia
      POSTGRES_PASSWORD: clawdia-dev
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdia"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (for caching / rate limiting) ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # ─── Monitoring ───
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - nats

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  nats-data:
  pg-data:
  redis-data:
  grafana-data:
